name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx vsce package
        env:
          LOCALSTACK_WEB_AUTH_REDIRECT: https://app.localstack.cloud/redirect
          NODE_ENV: ci

      - name: Test
        run: xvfb-run -a npx vscode-test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npx vsce package
        env:
          LOCALSTACK_WEB_AUTH_REDIRECT: https://app.localstack.cloud/redirect
          NODE_ENV: production
          ANALYTICS_API_URL: https://analytics.localstack.cloud/v1/events

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"

  publish-github-release-artifact:
    name: Publish artifact to GitHub Release
    runs-on: ubuntu-latest
    needs: [build, release]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release.outputs.tag_name }} *.vsix

  publish-vscode-marketplace:
    name: Publish to VS Marketplace
    runs-on: ubuntu-latest
    needs: [build, release]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Publish to VS Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-ovsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: [build, release]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix -p $OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
