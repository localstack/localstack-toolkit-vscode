name: Release

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, update changelog, and tag
        run: |
          BEFORE=$(node -p "require('./package.json').version")
          npx --yes commit-and-tag-version
          AFTER=$(node -p "require('./package.json').version")

          if [ "$BEFORE" != "$AFTER" ]; then
            git push --follow-tags origin main
          else
            echo "No releasable commits — skipping push"
          fi

  build:
    name: Build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        run: npx vsce package
        env:
          LOCALSTACK_WEB_AUTH_REDIRECT: https://app.localstack.cloud/redirect
          NODE_ENV: production
          ANALYTICS_API_URL: https://analytics.localstack.cloud/v1/events

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: "*.vsix"

  publish-vscode-marketplace:
    name: Publish to VS Marketplace
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Publish to VS Marketplace
        run: npx @vscode/vsce publish --packagePath localstack-${{ needs.build.outputs.version }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-ovsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Publish to Open VSX
        run: npx ovsx publish localstack-${{ needs.build.outputs.version }}.vsix -p $OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
