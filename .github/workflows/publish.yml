name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        run: npx vsce package
        env:
          LOCALSTACK_WEB_AUTH_REDIRECT: https://app.localstack.cloud/redirect
          NODE_ENV: production
          ANALYTICS_API_URL: https://analytics.localstack.cloud/v1/events

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: "*.vsix"

  publish-vscode-marketplace:
    name: Publish to VS Marketplace
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Publish to VS Marketplace
        run: npx @vscode/vsce publish --packagePath localstack-${{ needs.build.outputs.version }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-ovsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Publish to Open VSX
        run: npx ovsx publish localstack-${{ needs.build.outputs.version }}.vsix -p $OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
