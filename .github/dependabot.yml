version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "@types/vscode"
      - dependency-name: "@types/node"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"
