version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "@types/vscode"
      - dependency-name: "@types/node"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    cooldown:
      default-days: 7
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(ci)"
